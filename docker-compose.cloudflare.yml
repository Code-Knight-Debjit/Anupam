services:
  cloudflared:
    command: sh /etc/cloudflared/run-tunnel.sh
    volumes:
      - ./deploy/cloudflared/run-tunnel.sh:/etc/cloudflared/run-tunnel.sh:ro
      - ./deploy/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./deploy/cloudflared/creds:/etc/cloudflared/creds:ro

  nginx-origin:
    volumes:
      - ./deploy/nginx-origin-https.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs/origin.pem:/etc/nginx/ssl/origin.pem:ro
      - ./deploy/certs/origin.key:/etc/nginx/ssl/origin.key:ro
