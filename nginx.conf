upstream django {
    server web:8000;
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS redirect (301)
#
# Nginx only listens on port 80 inside Docker. HTTPS termination happens
# upstream — either at Cloudflare (if you use Cloudflare Tunnel / Proxy)
# or at the host's reverse proxy / load balancer.
#
# This block catches any raw HTTP requests that reach Nginx and forces
# a permanent redirect to the HTTPS canonical URL, which is what Google
# needs to stop indexing http:// URLs.
#
# Cloudflare passes the real protocol via X-Forwarded-Proto: https.
# We read that header and redirect only if the original request was HTTP.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name anupambearings.com www.anupambearings.com;
    client_max_body_size 20M;

    # If Cloudflare (or any upstream proxy) forwarded an HTTPS request,
    # $http_x_forwarded_proto == "https" — serve it normally.
    # If it was plain HTTP, send a 301 to the canonical HTTPS URL.
    set $redirect_to_https 0;
    if ($http_x_forwarded_proto = "http") {
        set $redirect_to_https 1;
    }
    # Also redirect www → non-www regardless of protocol
    if ($host = "www.anupambearings.com") {
        set $redirect_to_https 1;
    }
    if ($redirect_to_https = 1) {
        return 301 https://anupambearings.com$request_uri;
    }

    # Static files — served directly by Nginx, never hits Django
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files
    location /media/ {
        alias /app/media/;
        expires 30d;
        access_log off;
    }

    # Proxy everything else to Django/Gunicorn
    location / {
        proxy_pass          http://django;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Forwarded-Host   $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $http_x_forwarded_proto;
        proxy_read_timeout  90s;
        proxy_connect_timeout 90s;

        # Security headers — Google uses these as trust signals
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    }
}