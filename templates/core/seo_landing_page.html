{% extends "base.html" %}
{% load static %}

{#
  IMPORTANT: Do NOT add extra <script type="application/ld+json"> blocks here.
  All schema (WebSite, Organization, BreadcrumbList, FAQPage, LocalBusiness) is
  already injected by build_seo_context() via the seo_json_ld context variable
  and rendered in base.html's loop. Duplicating them here breaks Google's parser
  and prevents the site name and rich results from working correctly.
#}

{% block content %}
<section style="background:var(--gradient-hero);padding:9rem 0 4rem;position:relative;overflow:hidden;" aria-label="SEO landing hero">
  <div class="dot-grid"></div>
  <div class="container" style="position:relative;z-index:1;max-width:960px;">
    {# Breadcrumb — visible + accessible #}
    <nav aria-label="Breadcrumb" style="margin-bottom:1.5rem;">
      <ol style="display:flex;gap:.5rem;align-items:center;list-style:none;padding:0;margin:0;font-size:.82rem;color:rgba(255,255,255,.5);">
        <li><a href="/" style="color:rgba(255,255,255,.5);text-decoration:none;">Home</a></li>
        <li aria-hidden="true" style="opacity:.4;">›</li>
        <li aria-current="page" style="color:rgba(255,255,255,.75);">{{ landing_page.headline }}</li>
      </ol>
    </nav>

    <h1 class="display-lg anim-fade-up" style="color:#fff;max-width:780px;margin-top:.5rem;">
      {{ landing_page.headline }}
    </h1>
    <p class="body-lg anim-fade-up" style="color:rgba(255,255,255,.65);max-width:760px;margin-top:1.5rem;">
      {{ landing_page.intro }}
    </p>
    <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-top:2rem;">
      <a href="{% url 'contact:contact' %}" class="btn-primary">Request a Quote</a>
      <a href="tel:+919884400741" class="btn-ghost btn-ghost-white">Call Bengaluru</a>
    </div>
  </div>
</section>

<section class="section-pad surface-base">
  <div class="container" style="max-width:980px;">
    <div style="display:grid;grid-template-columns:1.2fr .8fr;gap:2rem;align-items:start;">
      <div>
        {% for section in landing_page.sections %}
        <article style="padding:1.25rem 0;border-bottom:1px solid rgba(226,191,176,0.12);">
          <h2 class="section-label" style="margin-bottom:.4rem;">{{ section.heading }}</h2>
          <p class="body-lg" style="color:var(--secondary);margin:0;">{{ section.body }}</p>
        </article>
        {% endfor %}
      </div>

      {# Sidebar: contact CTA replaces raw keyword list #}
      <aside style="background:var(--surface-container-low);border-radius:var(--radius-sm);padding:1.5rem;position:sticky;top:110px;">
        <p class="section-label" style="margin-bottom:.75rem;">Get a Quick Quote</p>
        <p style="color:var(--secondary);font-size:.9rem;margin-bottom:1.25rem;">
          Share your requirements and our technical team will respond within one business day.
        </p>
        <a href="{% url 'contact:contact' %}" class="btn-primary" style="width:100%;justify-content:center;display:flex;">Contact Sales</a>
        <div style="margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid rgba(226,191,176,0.12);">
          <p style="font-size:.82rem;color:var(--secondary);margin-bottom:.5rem;">Call directly:</p>
          <a href="tel:+919884400741" style="display:block;color:var(--on-surface);font-weight:600;text-decoration:none;margin-bottom:.25rem;">+91-98844-00741 (BLR)</a>
          <a href="tel:04446912265" style="display:block;color:var(--on-surface);font-weight:600;text-decoration:none;">044-4691-2265 (CHN)</a>
        </div>
        {% if related_pages %}
        <div style="margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid rgba(226,191,176,0.12);">
          <p style="font-size:.82rem;color:var(--secondary);margin-bottom:.75rem;">Related pages:</p>
          <ul style="margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:.5rem;">
            {% for page in related_pages %}
            <li><a href="{{ page.url }}" style="color:var(--primary-container);font-size:.88rem;text-decoration:none;">→ {{ page.label }}</a></li>
            {% endfor %}
          </ul>
        </div>
        {% endif %}
      </aside>
    </div>

    {% if landing_page.faq %}
    <section style="margin-top:4rem;">
      <h2 class="headline-md" style="margin-bottom:1rem;">Frequently Asked Questions</h2>
      <div style="display:grid;gap:1rem;" itemscope itemtype="https://schema.org/FAQPage">
        {% for item in landing_page.faq %}
        <details style="background:var(--surface-container-low);border-radius:var(--radius-sm);padding:1rem 1.25rem;" itemscope itemprop="mainEntity" itemtype="https://schema.org/Question">
          <summary style="cursor:pointer;font-weight:600;" itemprop="name">{{ item.question }}</summary>
          <div itemscope itemprop="acceptedAnswer" itemtype="https://schema.org/Answer">
            <p style="margin:0.75rem 0 0;color:var(--secondary);" itemprop="text">{{ item.answer }}</p>
          </div>
        </details>
        {% endfor %}
      </div>
    </section>
    {% endif %}

    {# Internal linking section — critical for topical authority #}
    <section style="margin-top:4rem;">
      <h2 class="section-label" style="margin-bottom:1rem;">Related Pages</h2>
      <div style="display:flex;flex-wrap:wrap;gap:.75rem;">
        <a href="/products/" class="btn-ghost">All Products</a>
        <a href="/bearing-supplier-bangalore/" class="btn-ghost">Bearing Supplier Bangalore</a>
        <a href="/bearing-supplier-chennai/" class="btn-ghost">Bearing Supplier Chennai</a>
        <a href="/timken-bearings/" class="btn-ghost">Timken Bearings</a>
        <a href="/deep-groove-ball-bearings/" class="btn-ghost">Deep Groove Ball Bearings</a>
        <a href="/spherical-roller-bearings/" class="btn-ghost">Spherical Roller Bearings</a>
        <a href="/contact/" class="btn-ghost">Contact</a>
      </div>
    </section>
  </div>
</section>

<section class="cta-banner">
  <div class="container">
    <div class="cta-banner-inner">
      <div>
        <h2 class="cta-title anim-slide-left">Need a technical match?<br/><span class="accent">We can source it.</span></h2>
      </div>
      <div class="anim-slide-right" style="display:flex;gap:1rem;flex-wrap:wrap;">
        <a href="{% url 'contact:contact' %}" class="btn-primary">Talk to Sales</a>
        <a href="tel:+919884400741" class="btn-ghost btn-ghost-white">Call Now</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
